      <path d="M245 55 C255 46, 260 40, 256 34 C252 28, 242 34, 245 44" stroke-width="0.5"/>

      <!-- Floating wisps -->
      <path d="M18 505 C8 498, 2 494, 6 488 C10 484, 18 490, 16 498" stroke-width="0.4"/>
