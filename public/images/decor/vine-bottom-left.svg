      <circle cx="65" cy="395" r="1.8" fill="#3d8b6b" fill-opacity="0.28" stroke="none"/>
      <circle cx="105" cy="305" r="1.5" fill="#3d8b6b" fill-opacity="0.25" stroke="none"/>
      <circle cx="130" cy="250" r="1.8" fill="#3d8b6b" fill-opacity="0.22" stroke="none"/>
      <circle cx="170" cy="150" r="1.5" fill="#3d8b6b" fill-opacity="0.2" stroke="none"/>
      <circle cx="205" cy="100" r="1.3" fill="#3d8b6b" fill-opacity="0.18" stroke="none"/>
      <circle cx="248" cy="42" r="1.2" fill="#3d8b6b" fill-opacity="0.15" stroke="none"/>
