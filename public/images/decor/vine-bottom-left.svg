      <path d="M5 535 C22 502, 38 472, 50 440 C64 405, 72 368, 84 335
               C96 300, 110 268, 126 238 C142 210, 162 182, 178 158
               C195 135, 212 112, 228 92"
            stroke-width="0.7" opacity="0.5"/>
    </g>

