      <circle cx="238" cy="58" r="2.5" fill="#3d8b6b" fill-opacity="0.38" stroke="none"/>
      <circle cx="233" cy="54" r="2.2" fill="#3d8b6b" fill-opacity="0.32" stroke="none"/>
