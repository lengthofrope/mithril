      <path d="M215 88 C213 84, 217 81, 220 84 C222 86, 220 90, 217 90Z" fill="#F5E6C8" fill-opacity="0.4" stroke="none"/>
      <path d="M210 92 C208 88, 212 86, 214 88 C216 90, 214 94, 210 94Z" fill="#F5E6C8" fill-opacity="0.32" stroke="none"/>

