<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | Team Lead Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-bg: #111827;
            --color-surface: #1f2937;
            --color-border: #374151;
            --color-text-primary: #f9fafb;
            --color-text-secondary: #9ca3af;
            --color-accent: #4f46e5;
            --color-accent-light: #6366f1;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 28rem;
            width: 100%;
            text-align: center;
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            margin-bottom: 1.5rem;
        }

        .icon-wrapper svg {
            width: 2.5rem;
            height: 2.5rem;
            color: var(--color-accent-light);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 0.9375rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            padding: 0.625rem 1.5rem;
            background-color: var(--color-accent);
            color: #fff;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease;
        }

        .retry-btn:hover {
            background-color: var(--color-accent-light);
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="icon-wrapper" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
            </svg>
        </div>

        <h1>You are offline</h1>

        <p class="subtitle">
            No internet connection detected.<br>
            Data will sync automatically when your connection is restored.
        </p>

        <div class="card">
            Your work is saved locally. Any changes made while offline will be synchronised as soon as you reconnect.
        </div>

        <a href="/" class="retry-btn">
            Try again
        </a>

    </div>

</body>
</html>
